name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write         # needed for checks
  id-token: write       # needed for npm publish with provenance
  contents: write       # needed for github release
  pull-requests: write  # needed for coverage comment

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
      - name: Lint
        run: biome ci --no-errors-on-unmatched .

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
      - name: Install
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test

  preview:
    name: Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
      - name: Install
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Publish Preview
        run: npx pkg-pr-new publish --pnpm --packageManager=pnpm

  # Creates and maintains a release PR; on merge to main it tags and creates a GitHub Release.
  # Uses release-please-config.json and .release-please-manifest.json (manifest mode).
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      # https://github.com/googleapis/release-please-action
      - name: Release Please
        uses: googleapis/release-please-action@v5
        with:
          # https://github.com/googleapis/release-please-action?tab=readme-ov-file#github-credentials
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  # Stable maintenance line for the previous major, cut from the `v1` branch.
  # Uses the default release-please-config.json / .release-please-manifest.json,
  # which on this branch track the 1.x line. On merge it tags + creates a GitHub
  # Release, which this branch's release.yml publishes under the `legacy`
  # dist-tag so it stays off `latest`.
  release-v1:
    name: Release v1
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/v1'
    steps:
      # https://github.com/googleapis/release-please-action
      - name: Release Please
        uses: googleapis/release-please-action@v5
        with:
          # https://github.com/googleapis/release-please-action?tab=readme-ov-file#github-credentials
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: v1

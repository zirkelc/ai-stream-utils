# IMPORTANT: DO NOT RENAME THIS FILE
# It uses Trusted Publisher to deploy without token
# https://www.npmjs.com/package/ai-stream-utils/access

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write # needed for npm publish with provenance
  contents: write # needed to force-push the floating major version tag

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      # http://github.com/actions/checkout
      - uses: actions/checkout@v5
      # https://github.com/pnpm/action-setup
      - uses: pnpm/action-setup@v4
      # https://github.com/actions/setup-node
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm build
      - run: pnpm test
      # This is the v1 maintenance line. It always publishes under the `legacy`
      # dist-tag so it never moves `latest` off the current major.
      # (npm rejects `v1` as a dist-tag since it parses as a SemVer range.)
      - name: Publish to npm (legacy)
        run: pnpm publish --provenance --no-git-checks --tag legacy
      # Move the floating v1.x tag onto this release commit so version-pinned
      # links like /tree/v1.x always resolve to the newest v1 release. Pushed
      # with the default GITHUB_TOKEN, whose pushes do not re-trigger workflows.
      # Gated to `release` since workflow_dispatch has no tag payload.
      - name: Update major version tag
        if: ${{ github.event_name == 'release' }}
        env:
          TAG: ${{ github.event.release.tag_name }} # e.g. v1.6.0
        run: |
          major="${TAG%%.*}"               # v1.6.0 -> v1
          git tag -f "${major}.x"          # tag the checked-out release commit -> v1.x
          git push -f origin "${major}.x"
